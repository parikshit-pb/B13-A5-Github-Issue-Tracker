<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker</title>
     <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- tailwind daisy ui -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="./style/style.css">
</head>
<body class="">
<nav class=" bg-white shadow p-4 flex justify-between md:flex-row md:justify-between md:items-center gap-3 ">
    <div class="flex items-center gap-3  md:gap-10 w-full md:w-auto">
        <img class="w-8" src="./assets/github-logo.png" alt="">
    <h1 class="text-xl font-bold sm:text-base">GitHub Issue Tracker</h1>
    </div>
    <div class="gap-10 flex sm:gap-7 w-full sm:w-auto">
        <input id="searchInput" type="text" class="border p-1 rounded-md sm:gap-10 w-full sm:w-auto " placeholder="Search">
        <button onclick="searchIssue()" class="bg-blue-500 text-white px-3 py-1 rounded-md sm:w-auto">+ New Issue</button>
    </div>
</nav>
<section class="tab">
    <div class="max-w-6xl mx-auto mt-6">
        <div class="flex gap-4 mb-6">
            <button onclick="filterIssue('all')" data-status="all" class="filter-btn tabBtn bg-gray-200 px-4 py-2">All</button>
            
            <button onclick="filterIssue('open')" data-status="open" class="filter-btn tabBtn bg-gray-200 px-4 py-2">open</button>

            <button onclick="filterIssue('closed')" data-status="closed"   class="filter-btn tabBtn bg-gray-200 px-4 py-2">closed</button>
        </div>
    </div>

   
</section>
 <div class="border-gray-200 p-2 rounded-lg">
    <div class="flex justify-between bg-white shadow p-4 rounded">
        <div class="flex gap-4 items-center">
            <img src="./assets/Aperture.png" alt="">
            <div>
                <h3 class="card-count text-2xl font-bold">0 Issues</h3>
                <p class="text-gray-400 text-sm">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex gap-3">
            <div class="flex gap-2 items-center">

                <div class="w-2 h-2 border rounded bg-green-500 border-none"></div>
                <p>Open</p>
            </div>
            <div class="flex gap-2 items-center">
                <div class=" w-2 h-2 rounded bg-purple-500"></div>
                <p>Closed</p>
            </div>
        </div>
    </div>
 </div>


<div id="issueContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 p-4"></div>

<!-- Modal -->
<div id="issueModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl w-11/12 md:w-2/5 p-6 relative">
    <!-- Close Button -->
    <button onclick="closeModal()" class="absolute top-3 right-3 bg-purple-600 text-white px-3 py-1 rounded">Close</button>

    <!-- Modal Content -->
    <h2 id="modalTitle" class="text-xl font-bold mb-2">Title Here</h2>
    <p class="text-gray-600 mb-2" id="modalDesc">Description Here</p>
    <p class="text-gray-500 mb-2"><b>Status:</b> <span id="modalStatus"></span></p>
    <p class="text-gray-500 mb-2"><b>Assignee:</b> <span id="modalAuthor"></span></p>
    <p class="text-gray-500 mb-2"><b>Priority:</b> <span id="modalPriority"></span></p>
    <p class="text-gray-500 mb-2"><b>Label:</b> <span id="modalLabel"></span></p>
    <p class="text-gray-500 mb-2"><b>Created At:</b> <span id="modalDate"></span></p>
  </div>
</div>

<!-- Loader -->
<div id="loader" class="hidden fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-50">
  <div class="loader border-4 border-blue-500 border-t-white rounded-full w-12 h-12 animate-spin"></div>
</div>




    

    <script src="./assets/js/data.js"></script>
    <script src="./assets/js/main.js"></script>
</body>
</html>
