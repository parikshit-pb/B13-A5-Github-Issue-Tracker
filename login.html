<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- tailwind daisy ui -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="./style/style.css">

</head>
<body>
    <div class="flex items-center justify-center h-screen bg-gray-100">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
            <img class="mx-auto" src="./assets/github-logo.png" alt="">
            <h1 class="text-2xl text-center font-bold mb-2 ">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-center mb-6">signe in to manage your issues </p>
            <label for="">Enter username</label>
            <input type="text" placeholder="username" id="username" class="w-full p-3 mb-4 border rounded">
            <label for="">Enter password</label>
            <input type="password" placeholder="password" id="password" class="w-full p-3 mb-4 border rounded">
            <button id="loginBtn" class="w-full border rounded-xl p-3 mt-4 bg-purple-600 text-white">Sign in</button>
        </div>
    </div>
   
    




    <script src="./assets/js/app.js"></script>
</body>
</html>
